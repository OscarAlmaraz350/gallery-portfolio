<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Portafolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="hero">
  <div class="logo-container">
    <img src="./assets/saynozlogo.png" alt="Mi Logo" class="logo" />
  </div>

  <div class="socials">
    <a href="#" target="_blank" aria-label="Instagram">IG</a>
    <a href="#" target="_blank" aria-label="Twitter">X</a>
    <a href="#" target="_blank" aria-label="YouTube">YT</a>
  </div>
</header>


<main>
  <!-- GALERÍA -->
  <section id="gallery" class="gallery">
    <!-- Aquí se insertarán imágenes dinámicamente -->
  </section>
</main>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
      <button id="closeModal">✕</button>
      <img id="modalImage" alt="Imagen grande"/>
      <div class="modal-info">
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>

        <button id="downloadBtn" class="btn">DOWNLOAD</button>
        <button id="premiumBtn" class="btn btn-premium">DOWNLOAD ALL CONTENT</button>
        
      </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/animejs/lib/anime.min.js"></script>
<script type="module" src="../dist/main.js"></script>
</body>
</html>
